version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: klipit-postgres
    environment:
      POSTGRES_DB: klipit
      POSTGRES_USER: klipit
      POSTGRES_PASSWORD: klipit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klipit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - klipit-network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder
    container_name: klipit-backend
    working_dir: /app/backend
    command: npm run dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://klipit:klipit@postgres:5432/klipit
      BACKEND_PORT: 5000
      JWT_SECRET: dev-secret-key
      REFRESH_TOKEN_SECRET: dev-refresh-secret
      CORS_ORIGIN: "http://localhost:3000"
      REACT_APP_API_URL: "http://localhost:5000"
      FRONTEND_URL: "http://localhost:3000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/dist:/app/backend/dist
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - klipit-network

  frontend:
    image: node:18-alpine
    container_name: klipit-frontend
    working_dir: /app/frontend
    command: npm start
    environment:
      REACT_APP_API_URL: "http://localhost:5000"
      REACT_APP_API_TIMEOUT: "30000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - klipit-network

  nginx:
    image: nginx:alpine
    container_name: klipit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - klipit-network

volumes:
  postgres_data:

networks:
  klipit-network:
    driver: bridge
