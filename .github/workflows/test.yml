name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: klipit_test
          POSTGRES_USER: klipit
          POSTGRES_PASSWORD: klipit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install backend dependencies
      run: |
        cd backend
        npm install

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm install

    - name: Lint backend
      run: |
        cd backend
        npm run lint

    - name: Run backend tests
      run: |
        cd backend
        DATABASE_URL=postgresql://klipit:klipit@localhost:5432/klipit_test npm test

    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --passWithNoTests

    - name: Build backend
      run: |
        cd backend
        npm run build

    - name: Build frontend
      run: |
        cd frontend
        npm run build
